<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garage AI</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; }
    h1 { margin-top: 0; }
    #search { width: 100%; max-width: 480px; padding: .6rem .8rem; font-size: 1rem;
              margin-bottom: 1.5rem; box-sizing: border-box; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 1rem;
            text-decoration: none; color: inherit; display: block; }
    .card:hover { border-color: #888; }
    .card h2 { font-size: 1.05rem; margin: 0 0 .4rem; }
    .card .meta { font-size: .85rem; color: #555; }
    .hp { font-weight: bold; }
    #empty { color: #777; display: none; }
  </style>
</head>
<body>
  <h1>Garage AI</h1>
  <p>Your pocket mechanic — data on {{ cars|length }} cars.</p>
  <input id="search" type="text" placeholder="Search cars… (e.g. q50, civic, mustang)" autofocus>
  <div class="grid" id="grid">
    {% for car in cars %}
    <a class="card" href="{{ url_for('car_page', name=car.name) }}" data-name="{{ car.name|lower }}">
      <h2>{{ car.name }}</h2>
      <div class="meta">{{ car.engine }}</div>
      <div class="meta"><span class="hp">{{ car.horsepower }} hp</span> &middot; {{ car.drivetrain }}</div>
    </a>
    {% endfor %}
  </div>
  <p id="empty">No cars match your search.</p>
  <script>
    const search = document.getElementById('search');
    const cards = [...document.querySelectorAll('.card')];
    const empty = document.getElementById('empty');
    search.addEventListener('input', () => {
      const q = search.value.trim().toLowerCase();
      let shown = 0;
      cards.forEach(c => {
        const match = c.dataset.name.includes(q);
        c.style.display = match ? '' : 'none';
        if (match) shown++;
      });
      empty.style.display = shown ? 'none' : 'block';
    });
  </script>
</body>
</html>
